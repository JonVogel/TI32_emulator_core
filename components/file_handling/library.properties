name=ESP32_File_Handling
version=0.1.0
author=Jon Vogel
maintainer=Jon Vogel
sentence=Hardware-agnostic FLASH/SD/V9T9 disk-image file I/O for TI BASIC on ESP32.
paragraph=Routes BASIC's OPEN/CLOSE/PRINT#/INPUT# operations to LittleFS, SD/SD_MMC, or mounted V9T9 .DSK images. Also exposes program SAVE/OLD routing (FLASH.NAME / SDCARD.NAME / DSKn.NAME prefix parsing, smart .bas extension fallback, V9T9 PROGRAM-format binary serializer) so sibling projects don't reinvent that glue. Hardware-agnostic: each project initializes its preferred SD library (SD over SPI or SD_MMC) and hands the resulting fs::FS pointer to fio::setSDFs() at boot.
category=Data Storage
url=https://github.com/JonVogel/ESP32_File_Handling
architectures=esp32
includes=file_io.h,program_io.h
